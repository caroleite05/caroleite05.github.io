career-profile:
  title: Career Profile
  summary: |
    Third-year Bachelor's student in Bioinformatics at the Faculty of Sciences, 
    University of Porto, with a strong interest in the application of data science, 
    artificial intelligence, and bioinformatics to healthcare.
    I have a multidisciplinary background, with knowledge in programming (Python), 
    data analysis, machine learning, genetics, and biology. I am particularly interested 
    in projects that combine technology and life sciences to solve real-world problems in 
    healthcare, especially in the context of biomedical data analysis, clinical bioinformatics, 
    and personalized medicine.
    I am seeking to further develop my expertise in Health Informatics, contributing to the 
    development of innovative solutions that support clinical research, health data analysis, 
    and the improvement of medical care.
    Alongside my academic path, I am a high-performance Artistic Swimming athlete, which has 
    helped me develop resilience, focus, and strong organizational skills—qualities that I bring 
    into both my academic and professional life.

experiences:
  title: Experience
  info:
  - role: Bioinformatics Intern
    time: feb 2026 - present
    company: i3S - Instituto de Investigação e Inovação em Saúde
    details: |
      Contribution to the development and maintenance of the pegi3S Bioinformatics Docker Images Project (BDIP), a curated collection of 150+ Docker containers supporting genomics, transcriptomics, phylogenetics, and structural biology workflows.
      - Developing and maintaining Docker-based bioinformatics environments to ensure portability and reproducibility.
      - Implementing automated testing frameworks for container validation.
      - Supporting large-scale containerized infrastructures for bioinformatics applications.

      Supervised by Prof. Jorge Vieira and Prof. Cristina Vieira.
  

